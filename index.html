        const getTropLon = (Astronomy, id, time, observer) => {
            if (id === 'Rahu' || id === 'Ketu') {
                const T = time.tt / 36525.0;
                const tropicalRahu = (125.04452 - 1934.136261 * T + 0.0020708 * T * T + (T * T * T) / 450000) % 360 + 360;
                return id === 'Rahu' ? tropicalRahu : (tropicalRahu + 180) % 360;
            }

            const rad = Math.PI / 180;
            const eps = 23.4392911 * rad;
            const sinLon = Math.sin(equ.ra * 15 * rad) * Math.cos(eps) + Math.tan(equ.dec * rad) * Math.sin(eps);
            let lon = Math.atan2(sinLon, Math.cos(equ.ra * 15 * rad)) / rad;
            return lon < 0 ? lon + 360 : lon;
        };

        const getAspectEnd = (Astronomy, p1Name, p2Name, baseType, startDate, observer) => {
            // The Ascendant isn't a physical planet and moves incredibly fast. 
            // If it's involved, we bypass the heavy math and return a fast 2-hour expiration.
            if (p1Name === 'Ascendant' || p2Name === 'Ascendant') {

            const speeds = { 'Moon': 1, 'Mercury': 2, 'Venus': 2, 'Sun': 2, 'Mars': 2, 'Jupiter': 3, 'Saturn': 3 };
            const speedTier = Math.min(speeds[p1Name] || 3, speeds[p2Name] || 3);

            let stepHours = 2; // Fast
            let maxDays = 14; 
            if (speedTier === 2) { stepHours = 24; maxDays = 180; } // Medium
            else if (speedTier === 3) { stepHours = 120; maxDays = 1825; } // Slow

            const maxIter = (maxDays * 24) / stepHours;
            const startMs = startDate.getTime();

            for (let i = 1; i <= maxIter; i++) {
                const testTime = new Astronomy.AstroTime(new Date(startMs + i * stepHours * 3600000));
                const l1 = getTropLon(Astronomy, p1Name, testTime, observer);

                                                </div>
                                            )}
                                            {calFilters.vratas && d.tithiMarker && <div title={EVENT_TOOLTIPS[d.tithiMarker]} className="text-[9px] font-medium rounded border bg-fuchsia-900/20 border-fuchsia-500/30 text-fuchsia-400 text-center px-1 py-0.5 cursor-help">✨ {d.tithiMarker} Vrata</div>}
                                            {calFilters.sarpa && d.isSarpa && <div title="Kala Sarpa Yoga: All planets hemmed between Rahu and Ketu. Intense karmic period, fated events." className="text-[9px] font-medium rounded bg-emerald-900/20 border border-emerald-500/30 text-emerald-400 flex items-center justify-center gap-1.5 px-1 py-0.5 cursor-help"><Icon name="AlertTriangle" className="w-2.5 h-2.5" /> Kala Sarpa</div>}
                                            
                                            {calFilters.dignities && (d.rxEvents?.length > 0 || d.activeDignities?.length > 0) && (
                                                <div className="flex flex-wrap justify-center gap-1 mt-1 pt-1 border-t border-slate-800/50">
                                                    {d.rxEvents?.map((rx, idx) => (
                                                        <div key={`cal-rx-${idx}`} className={`text-[8px] px-1 py-0.5 rounded border flex items-center justify-center gap-0.5 cursor-help ${rx.type.includes('Start') ? 'bg-red-900/40 border-red-500/50 text-red-300' : rx.type.includes('End') ? 'bg-emerald-900/40 border-emerald-500/50 text-emerald-300' : 'bg-orange-900/30 border-orange-500/40 text-orange-300'}`} title={`${rx.planet} ${rx.type === 'Rx' ? 'Retrograde (energy turned inward)' : rx.type.includes('Start') ? 'Stations Retrograde (energy turns inward)' : 'Stations Direct (energy moves forward)'}`}>
                                                            {PLANET_GLYPHS[rx.planet]} {rx.type === 'Rx' ? 'Rx' : rx.type.includes('Start') ? 'RxS' : 'RxE'}
                                                        </div>
                                                    ))}
                                                    {d.activeDignities?.map((ad, idx) => {
                                                        const colorClass = ad.dignity === 'Exalted' ? 'text-green-400 bg-green-900/30 border-green-500/30' : ad.dignity === 'Debilitated' ? 'text-red-400 bg-red-900/30 border-red-500/30' : 'text-yellow-400 bg-yellow-900/30 border-yellow-500/30';
                                                        let tooltipText = `${ad.planet} ${ad.dignity}`;
                                                        if (ad.dignity === 'Ruling' && typeof DIGNITY_TOOLTIPS !== 'undefined') tooltipText += `. ${DIGNITY_TOOLTIPS.ruling || ''}`;
                                                        else if (ad.dignity === 'Exalted' && typeof DIGNITY_TOOLTIPS !== 'undefined') tooltipText += `. ${DIGNITY_TOOLTIPS.exalted || ''}`;
                                                        else if (ad.dignity === 'Debilitated' && typeof DIGNITY_TOOLTIPS !== 'undefined') tooltipText += `. ${DIGNITY_TOOLTIPS.debilitated || ''}`;
                                                        
                                                        return (
                                                            <div key={`cal-dig-${idx}`} className={`text-[8px] px-1 py-0.5 rounded border ${colorClass} flex items-center gap-0.5 cursor-help`} title={tooltipText}>
                                                                {PLANET_GLYPHS[ad.planet]} {ad.dignity[0]}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                            {calFilters.ingress && d.transits && d.transits.map((t, idx) => (
                                            <div key={idx} title={formatIngressTooltip(t)} className="text-[9px] md:text-[10px] px-1.5 py-0.5 rounded bg-slate-950/50 border border-slate-700 flex items-center flex-wrap justify-center gap-1 w-fit h-fit mt-0.5 cursor-help">
                                                <span className={`${PLANET_COLORS[t.planet]}`}>{PLANET_GLYPHS[t.planet]}</span>
                                                <span className="text-slate-400 font-bold uppercase tracking-wider truncate text-[8px] md:text-[9px]">{t.planet.slice(0,3)} ➡️ {t.to.slice(0,3)}</span>
                                            </div>
                                            ))}
                                        </div>
                                        
                                        {/* --- MOBILE CALENDAR CHIPS --- */}
                                        <div className={`${isWeek ? 'hidden' : 'flex md:hidden'} flex-wrap gap-0.5 justify-end`}>
                                            {calFilters.holidays && d.holidays?.map((h, i) => (
                                            <span key={`h-m-${i}`} title={h} className="text-[8px] cursor-help">{h.split(' ')[0]}</span>
                                            ))}
                                            {calFilters.lunar && d.deityMarker && <span title={EVENT_TOOLTIPS[d.deityMarker]} className="text-[8px] cursor-help">✨</span>}
                                            {calFilters.lunar && d.specialPhase && <span title={EVENT_TOOLTIPS[d.specialPhase]} className="text-[8px] cursor-help">{d.specialPhase.includes('Full') ? '🌕' : d.specialPhase.includes('Deipnon') ? '🌑' : '🌒'}</span>}
                                            {calFilters.solar && d.solarEvent && (
                                                <span onClick={(e) => handleSolarEventClick(e, d.solarEvent, d.dateObj)} title={`☀️ ${d.solarEvent}\nSignificant shift in solar/seasonal energy. Click to search.`} className="text-[8px] cursor-pointer hover:scale-125 transition-transform">
                                                    ☀️
                                                </span>
                                            )}
                                            {calFilters.lunar && d.lunarEvent && <span title={`⚖️ ${d.lunarEvent}\nShift in Moon's declination`} className="text-[8px] cursor-help">⚖️</span>}
                                            {calFilters.lunar && d.eclipseEvent && (
                                                <span onClick={(e) => handleEclipseClick(e, d.eclipseEvent, d.dateObj)} title={`${d.eclipseEvent.includes('Solar') ? '☀️' : '🌑'} ${d.eclipseEvent}\nHigh impact karmic alignment. Click to search.`} className="text-[8px] cursor-pointer hover:scale-125 transition-transform">
                                                    {d.eclipseEvent.includes('Solar') ? '☀️' : '🌑'}
                                                </span>
                                            )}
                                            {calFilters.vratas && d.tithiMarker && <span title={EVENT_TOOLTIPS[d.tithiMarker]} className="text-[8px] cursor-help">✨</span>}
                                            {calFilters.sarpa && d.isSarpa && <span title="Kala Sarpa Yoga: All planets hemmed between Rahu and Ketu. Intense karmic period, fated events." className="text-[8px] cursor-help">🐍</span>}
                                            {calFilters.dignities && d.rxEvents?.map((rx, i) => (
                                                <span key={`rx-m-${i}`} title={`${rx.planet} ${rx.type === 'Rx' ? 'Retrograde (energy turned inward)' : rx.type.includes('Start') ? 'Stations Retrograde (energy turns inward)' : 'Stations Direct (energy moves forward)'}`} className={`text-[8px] cursor-help ${rx.type.includes('Start') ? 'text-red-400' : rx.type.includes('End') ? 'text-emerald-400' : 'text-orange-400'}`}>{PLANET_GLYPHS[rx.planet]}</span>
                                            ))}
                                            {calFilters.dignities && d.activeDignities?.map((ad, i) => {
                                                let tooltipText = `${ad.planet} ${ad.dignity}`;
                                                if (ad.dignity === 'Ruling' && typeof DIGNITY_TOOLTIPS !== 'undefined') tooltipText += `. ${DIGNITY_TOOLTIPS.ruling || ''}`;
                                                else if (ad.dignity === 'Exalted' && typeof DIGNITY_TOOLTIPS !== 'undefined') tooltipText += `. ${DIGNITY_TOOLTIPS.exalted || ''}`;
                                                else if (ad.dignity === 'Debilitated' && typeof DIGNITY_TOOLTIPS !== 'undefined') tooltipText += `. ${DIGNITY_TOOLTIPS.debilitated || ''}`;
                                                
                                                return (
                                                    <span key={`d-m-${i}`} title={tooltipText} className={`text-[8px] cursor-help ${ad.dignity === 'Exalted' ? 'text-green-400' : ad.dignity === 'Debilitated' ? 'text-red-400' : 'text-yellow-400'}`}>{PLANET_GLYPHS[ad.planet]}</span>
                                                )
                                            })}
                                        </div>
                                        </div>
                                    </div>
                                    );
                                })}
                            </div>
                            </div>
                        </section>
                        )}
                    </main>

                    <footer className="w-full text-center py-6 mt-auto border-t border-slate-800/50 text-[10px] sm:text-xs text-slate-500 uppercase tracking-widest z-10 no-print">
                        Work in Progress | &copy; 3 Awakenings 2026
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MagiCALApp />);
    </script>
</body>
</html>
